name: Flutter Windows Build

on:
  push:
    branches:
      - main # या तुम्हारी मुख्य ब्रांच का नाम (जैसे master)

jobs:
  build:
    runs-on: windows-latest # यह GitHub के Windows कंप्यूटर पर चलेगा

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 ही इस्तेमाल करें

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Build Folder (CRITICAL)
        # पुरानी बिल्ड फाइलों को हटाकर सब कुछ साफ़ करें
        run: flutter clean

      - name: Upgrade dependencies (CRITICAL)
        # सुनिश्चित करें कि सभी पैकेज नए हैं
        run: flutter pub upgrade

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        # Release बिल्ड बनाएं. यह ज़रूरी है कि यह चरण सफ़ल हो.
        # हम 'build_windows' कमांड के बाद एक छोटी सी जाँच भी जोड़ रहे हैं.
        run: |
          flutter build windows --release
          if (Test-Path -Path build/windows/runner/Release) {
            Write-Host "Build folder exists! Proceeding to upload..."
          } else {
            Write-Error "CRITICAL ERROR: Build folder DOES NOT exist. Flutter build failed silently."
            exit 1
          }

      - name: Upload Build Artifact
        # अगर सब कुछ सही रहा, तो अपलोड करो
        if: success()
        uses: actions/upload-artifact@v4 # v4 ही इस्तेमाल करें
        with:
          name: windows-build
          # Release फोल्डर का पूरा पाथ दें. GitHub इसे अपने आप ज़िप कर देगा.
          path: build/windows/runner/Release
          # कुछ समय के लिए ज़िप को स्टोर करने दें ताकि अपलोड मिस न हो
          retention-days: 1
