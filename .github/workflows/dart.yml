name: Flutter Windows Build

on:
  push:
    branches:
      - main # या तुम्हारी मुख्य ब्रांच का नाम (जैसे master)

jobs:
  build:
    runs-on: windows-latest # यह GitHub के Windows कंप्यूटर पर चलेगा

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 ही इस्तेमाल करें

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        id: build_windows # इसे एक ID दी ताकि हम बाद में चेक कर सकें
        # Release बिल्ड बनाएं. यह ज़रूरी है कि यह चरण सफ़ल हो.
        run: flutter build windows --release

      - name: Check Build Folder (DEBUG ONLY)
        # अगर पिछला चरण सफ़ल हुआ, तो चेक करो कि फोल्डर मौजूद है या नहीं
        if: success()
        run: |
          if (Test-Path -Path build/windows/runner/Release) {
            Write-Host "Build folder exists! Proceeding to upload..."
          } else {
            Write-Error "CRITICAL ERROR: Build folder DOES NOT exist. This should not happen. Flutter build failed silently."
            exit 1
          }

      - name: Upload Build Artifact
        # अगर सब कुछ सही रहा, तो अपलोड करो
        if: success()
        uses: actions/upload-artifact@v4 # v4 ही इस्तेमाल करें
        with:
          name: windows-build
          # Release फोल्डर का पूरा पाथ दें
          path: build/windows/runner/Release
          # कुछ समय के लिए ज़िप को स्टोर करने दें ताकि अपलोड मिस न हो
          retention-days: 1
