name: Flutter Windows Build

on:
  push:
    branches:
      - main # या तुम्हारी मुख्य ब्रांच का नाम (जैसे master)

jobs:
  build:
    runs-on: windows-latest # यह GitHub के Windows कंप्यूटर पर चलेगा

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        run: flutter build windows --release

      - name: Create Zip Archive
        run: |
          Compress-Archive -Path build/windows/runner/Release/* -DestinationPath mentor_classes_erp_windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-build
          path: mentor_classes_erp_windows.zip
