name: Flutter Windows Build

on:
  push:
    branches:
      - main # या तुम्हारी मुख्य ब्रांच का नाम (जैसे master)

jobs:
  build:
    runs-on: windows-latest # यह GitHub के Windows कंप्यूटर पर चलेगा

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 ही इस्तेमाल करें

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        # यह सुनिश्चित करें कि यह चरण चले, वरना बिल्ड नहीं बनेगा
        run: flutter build windows --release

      # "Create Zip Archive" चरण यहाँ से हटा दिया गया है

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4 # v4 ही इस्तेमाल करें
        with:
          name: windows-build
          # सीधे Release फोल्डर का पाथ दें. GitHub इसे अपने आप ज़िप कर देगा.
          path: build/windows/runner/Release
